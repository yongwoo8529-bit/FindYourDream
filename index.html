<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - 메인 메뉴</title>
    <link rel="stylesheet" href="src/style.css">
    <style>
        .menu-btn-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <canvas id="stars-bg"></canvas>
    <div class="app-container">
        <header class="nav">
            <div class="logo">POLARIS</div>
        </header>

        <section class="section active" style="align-items: center; justify-content: center; height: 80vh;">
            <h1>POLARIS</h1>
            <p style="text-align: center; color: rgba(255, 255, 255, 0.8);">어느 여정으로 떠나시겠습니까?</p>
            
            <div class="menu-btn-container">
                <button class="btn-start" onclick="location.href='polaris.html'">나만의 북극성 만들기</button>
                <button class="btn-start" onclick="location.href='bigbang.html'">빅뱅 강화하기</button>
                <button class="btn-start" onclick="location.href='horoscope.html'">오늘의 북극성 운세 확인 하기</button>
            </div>
        </section>
    </div>
    
    <script>
        const canvas = document.getElementById('stars-bg');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const drawStars = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 200; i++) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random()})`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            };
            drawStars();
        }
    </script>
</body>
</html>
