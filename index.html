<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>POLARIS</title>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* [전역 디자인 시스템] */
        :root {
            --bg-color: #040a18;
            --accent-blue: #4080ff;
            --accent-purple: #9060ff;
            --accent-teal: #20c8a0;
            --text-white: #ffffff;
            --text-dim: #5a8ab0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: system-ui, -apple-system, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            overscroll-behavior: none;
            display: flex;
            justify-content: center;
        }

        /* [배경 시스템] */
        .page-wrapper {
            width: 100%;
            max-width: 390px;
            height: 100%;
            position: relative;
            background: url('bg-main.png') no-repeat center center;
            background-size: cover;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(4, 10, 24, 0.55);
            z-index: 1;
        }

        canvas#background-canvas {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* [UI 레이아웃] */
        .content-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 40px) 20px 40px;
        }

        /* 행성 오브젝트 섹션 */
        .planet-section {
            margin-top: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .planet-orb {
            width: 120px;
            height: 120px;
            background: url('interactive-planet.png') no-repeat center center;
            background-size: contain;
            border-radius: 50%;
            filter: drop-shadow(0 0 20px var(--accent-blue));
            z-index: 5;
            transition: transform 0.2s;
        }

        .planet-orb:active {
            transform: scale(0.9);
        }

        /* 위성 공전 효과 */
        .satellite-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .satellite {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #fff, var(--accent-blue));
            border-radius: 50%;
            top: -6px;
            left: calc(50% - 6px);
            box-shadow: 0 0 10px var(--accent-blue);
            animation: orbit 8s linear infinite;
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(90px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(90px) rotate(-360deg); }
        }

        .click-hint {
            margin-top: 15px;
            font-size: 11px;
            color: var(--accent-blue);
            letter-spacing: 1px;
            opacity: 0.8;
            animation: text-pulse 2s infinite;
        }

        @keyframes text-pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 타이틀 블록 */
        .title-block {
            margin-top: 20px;
            text-align: center;
        }

        .main-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-blue);
            margin-bottom: 8px;
        }

        .sub-title {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 메뉴 카드 */
        .menu-container {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-card {
            position: relative;
            padding: 24px 20px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--theme-color);
            box-shadow: 0 0 20px var(--theme-color-glow);
        }

        .dest-label {
            font-family: 'Courier New', Courier, monospace;
            font-size: 9px;
            color: var(--theme-color);
            margin-bottom: 8px;
            font-weight: 900;
        }

        .menu-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .tag-label {
            font-size: 8px;
            font-family: 'Courier New', Courier, monospace;
            opacity: 0.5;
            position: absolute;
            bottom: 8px;
            right: 12px;
        }

        .glow-circle {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: var(--theme-color);
            filter: blur(40px);
            opacity: 0.3;
            pointer-events: none;
        }

        /* 스크롤 유도 */
        .scroll-hint {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 30px;
        }

        .dot {
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.2;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .dot:nth-child(1) { animation: blink 1.5s infinite 0s; }
        .dot:nth-child(2) { animation: blink 1.5s infinite 0.2s; }
        .dot:nth-child(3) { animation: blink 1.5s infinite 0.4s; }

        #particle-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="overlay"></div>
        <canvas id="background-canvas"></canvas>
        <canvas id="particle-overlay"></canvas>

        <main class="content-layer">
            <!-- 행성 오브젝트 -->
            <div class="planet-section" onclick="burstPlanet(event)">
                <div class="satellite-orbit">
                    <div class="satellite"></div>
                </div>
                <div class="planet-orb" id="main-planet"></div>
                <div class="click-hint">메인 화면 성운을 클릭해보세요</div>
            </div>

            <!-- 타이틀 -->
            <div class="title-block">
                <h1 class="main-title">POLARIS</h1>
                <p class="sub-title">어느 여정으로 떠나시겠습니까?</p>
            </div>

            <!-- 메뉴 카드 -->
            <div class="menu-container">
                <a href="about.html" class="menu-card" style="--theme-color: #4080ff; --theme-color-glow: rgba(64, 128, 255, 0.4);">
                    <span class="dest-label">DEST.00</span>
                    <span class="menu-name">북극성이란?</span>
                    <span class="tag-label">[PROJECT MISSION]</span>
                    <div class="glow-circle"></div>
                </a>

                <a href="polaris.html" class="menu-card" style="--theme-color: #9060ff; --theme-color-glow: rgba(144, 96, 255, 0.4);">
                    <span class="dest-label">DEST.01</span>
                    <span class="menu-name">나만의 북극성 만들기</span>
                    <span class="tag-label">[POLARIS MATRIX]</span>
                    <div class="glow-circle"></div>
                </a>

                <a href="board.html" class="menu-card" style="--theme-color: #20c8a0; --theme-color-glow: rgba(32, 200, 160, 0.4);">
                    <span class="dest-label">DEST.02</span>
                    <span class="menu-name">보드: 당신의 이야기</span>
                    <span class="tag-label">[GALAXY SIGNALS]</span>
                    <div class="glow-circle"></div>
                </a>
            </div>

            <!-- 스크롤 힌트 -->
            <div class="scroll-hint">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </main>
    </div>

    <script>
        const bgCanvas = document.getElementById('background-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width, height;

        const stars = [];
        const meteors = [];

        function resize() {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
        }

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 0.5 + Math.random() * 1.5;
                this.opacity = 0.2 + Math.random() * 0.8;
                this.blinkSpeed = 0.005 + Math.random() * 0.01;
            }

            draw() {
                this.opacity += this.blinkSpeed;
                if (this.opacity > 1 || this.opacity < 0.2) this.blinkSpeed *= -1;
                bgCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
        }

        class Meteor {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.len = 20 + Math.random() * 50;
                this.speed = 3 + Math.random() * 10;
                this.opacity = 1;
            }

            draw() {
                this.x += this.speed;
                this.y += this.speed;
                this.opacity -= 0.02;

                if (this.opacity <= 0) return false;

                bgCtx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                bgCtx.lineWidth = 1;
                bgCtx.beginPath();
                bgCtx.moveTo(this.x, this.y);
                bgCtx.lineTo(this.x - this.len, this.y - this.len);
                bgCtx.stroke();
                return true;
            }
        }

        function initBG() {
            resize();
            for (let i = 0; i < 180; i++) stars.push(new Star());
            setInterval(() => {
                if (meteors.length < 3) meteors.push(new Meteor());
            }, 3000);
        }

        function animateBG() {
            bgCtx.clearRect(0, 0, width, height);
            stars.forEach(s => s.draw());
            for (let i = meteors.length - 1; i >= 0; i--) {
                if (!meteors[i].draw()) meteors.splice(i, 1);
            }
            requestAnimationFrame(animateBG);
        }

        const pCanvas = document.getElementById('particle-overlay');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        let isBursting = false;

        function burstPlanet(e) {
            if (isBursting) return;
            isBursting = true;

            const rect = document.getElementById('main-planet').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            gsap.to("#main-planet", { opacity: 0, scale: 2, duration: 0.4 });

            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: centerX,
                    y: centerY,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    size: 1 + Math.random() * 3,
                    color: i % 3 === 0 ? '#4080ff' : '#ffffff',
                    opacity: 1
                });
            }

            // Burst then Gather
            gsap.to({}, {
                duration: 2.2,
                onUpdate: function() {
                    const p = this.progress();
                    if (p < 0.4) {
                        particles.forEach(pt => {
                            pt.x += pt.vx;
                            pt.y += pt.vy;
                            pt.vx *= 0.96;
                            pt.vy *= 0.96;
                        });
                    } else {
                        particles.forEach(pt => {
                            pt.x += (centerX - pt.x) * (p * 0.15);
                            pt.y += (centerY - pt.y) * (p * 0.15);
                        });
                    }
                },
                onComplete: () => {
                    particles = [];
                    isBursting = false;
                    gsap.to("#main-planet", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" });
                }
            });
        }

        function animateParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            particles.forEach(p => {
                pCtx.globalAlpha = p.opacity;
                pCtx.fillStyle = p.color;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resize);
        initBG();
        animateBG();
        animateParticles();
    </script>
</body>
</html>
