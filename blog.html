<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow-x: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [Navigation] */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 800px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            background: rgba(4, 10, 24, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #4080ff;
        }

        .nav-links a.active {
            color: #fff;
            font-weight: 700;
        }

        /* [Header] */
        .page-header {
            margin-top: 120px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .header-hint {
            font-size: 14px;
            color: #4080ff;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [Content Container] */
        .blog-container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto 100px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            line-height: 1.4;
            word-break: keep-all;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            word-break: keep-all;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content h2 {
            font-size: 1.5rem;
            margin: 2.5rem 0 1rem;
            color: #fff;
            border-left: 4px solid #4080ff;
            padding-left: 15px;
        }

        .post-content blockquote {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(64, 128, 255, 0.1);
            border-radius: 15px;
            border-left: 4px solid #4080ff;
            font-style: italic;
        }

        .post-content hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 3rem 0;
        }

        .highlight {
            color: #4080ff;
            font-weight: 700;
        }

        /* [Stars Background] */
        #stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* [Footer] */
        .main-footer {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .footer-col h4 {
            font-size: 14px;
            margin-bottom: 20px;
            color: #4080ff;
            text-transform: uppercase;
        }

        .footer-col ul { list-style: none; }
        .footer-col li { margin-bottom: 10px; }
        .footer-col a { color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 13px; }

        .footer-bottom {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .blog-container {
                padding: 1.5rem;
                border-radius: 20px;
            }
            .post-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="stars-bg"></canvas>

    <header class="page-header">

        <h1 style="font-family: 'Orbitron', sans-serif; letter-spacing: 5px; margin-bottom: 2rem;">POLARIS BLOG</h1>

        <div class="post-selector">

    <article class="blog-container">
        <div id="post-view">

            <div id="view-content" class="post-content">
                <p>글을 불러오는 중입니다.</p>
            </div>

    </article>

    <style>
        .post-selector {
            max-width: 800px;
            width: 90%;
            margin: 0 auto 40px;
            overflow-x: auto;
            padding-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .post-selector::-webkit-scrollbar { height: 4px; }
        .post-selector::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

        .selector-track {
            display: flex;
            gap: 12px;
            justify-content: center;
            min-width: max-content;
        }

        .post-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .post-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .post-btn.active {
            background: linear-gradient(135deg, #4080ff, #9060ff);
            border-color: #fff;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(64, 128, 255, 0.4);
        }
    </style>

    <script>
        const blogPosts = {
            1: {
                title: "내가 좋아하는 것과 잘하는 것이 다를 때, 어떻게 해야 할까?",
                content: `
                    <p>"좋아하는 것을 직업으로 삼아야 할까, 아니면 잘하는 것을 직업으로 삼아야 할까?"</p>
                    <p>이 질문은 수많은 청소년들이 진로를 고민할 때 부딪히는 가장 대표적인 딜레마 중 하나입니다. 좋아하는 것과 잘하는 것이 일치하면 더할 나위 없이 좋겠지만, 현실에서는 그 둘이 다른 경우가 훨씬 많습니다.</p>
                    <h2>좋아하는 것의 힘</h2>
                    <p>좋아하는 일을 직업으로 삼았을 때의 가장 큰 장점은 <span class="highlight">지속성</span>입니다. 힘들고 어려운 순간이 와도 버텨낼 수 있는 동력이 생기죠.</p>
                    <h2>잘하는 것의 강점</h2>
                    <p>반면 잘하는 것은 성취감을 줍니다. 인정받는 경험은 자존감을 높이고 다음 단계로 나아갈 용기를 주죠.</p>
                    <h2>교집합을 찾아라</h2>
                    <p>결론은 완벽한 하나를 찾기보다, 두 영역의 교집합을 만들어가는 과정에 있습니다. POLARIS와 함께 당신만의 비율을 찾아보세요.</p>
                `
            },
            2: { title: "글 2: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            3: { title: "글 3: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            4: { title: "글 4: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            5: { title: "글 5: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            6: { title: "글 6: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            7: { title: "글 7: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            8: { title: "글 8: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            9: { title: "글 9: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            10: { title: "글 10: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" }
        };

        const btnContainer = document.getElementById('post-buttons');
        const viewTitle = document.getElementById('view-title');
        const viewContent = document.getElementById('view-content');

        // Initial setup
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'post-btn' + (i === 1 ? ' active' : '');
            btn.innerText = '글 ' + i;
            btn.onclick = () => loadPost(i, btn);
            btnContainer.appendChild(btn);
        }

        function loadPost(id, btn) {
            // Remove active class from all
            document.querySelectorAll('.post-btn').forEach(b => b.classList.remove('active'));
            // Add to current
            btn.classList.add('active');

            // Animation out
            gsap.to("#post-view", {
                opacity: 0, 
                y: 10, 
                duration: 0.3,
                onComplete: () => {
                    const post = blogPosts[id] || { title: "Error", content: "Post not found." };
                    viewTitle.innerHTML = post.title;
                    viewContent.innerHTML = post.content;
                    
                    // Animation in
                    gsap.to("#post-view", { opacity: 1, y: 0, duration: 0.5 });
                }
            });
        }

        // Load First Post
        window.addEventListener('load', () => loadPost(1, document.querySelector('.post-btn')));
    </script>

    <script>
        const canvas = document.getElementById('stars-bg');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            const stars = [];
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Star {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5;
                    this.opacity = Math.random();
                    this.blinkSpeed = 0.005 + Math.random() * 0.01;
                }
                draw() {
                    this.opacity += this.blinkSpeed;
                    if (this.opacity > 1 || this.opacity < 0) this.blinkSpeed *= -1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, this.opacity)})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 200; i++) stars.push(new Star());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => s.draw());
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
    <script>
        const nt = document.getElementById('nav-toggle');
        const nm = document.getElementById('nav-menu');
        nt.addEventListener('click', (e) => { e.stopPropagation(); nm.classList.toggle('active'); });
        document.addEventListener('click', (e) => { if (!nm.contains(e.target)) nm.classList.remove('active'); });
    </script>
</body>
