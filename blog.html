    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow-x: hidden;
            font-family: 'Noto Sans KR', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [Navigation] */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 800px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            background: rgba(4, 10, 24, 0.8);

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            color: #fff;
            text-decoration: none;
        }

        .nav-links {
            display: flex;

        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 13px;

        }

        .nav-links a:hover {
            color: #4080ff;
        }

        .nav-links a.active {
            color: #fff;
            font-weight: 700;
        }

        /* [Header] */
        .page-header {
            margin-top: 120px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .header-hint {
            font-size: 14px;
            color: #4080ff;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [Content Container] */
        .blog-container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto 100px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            line-height: 1.4;
            word-break: keep-all;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            word-break: keep-all;
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content h2 {
            font-size: 1.5rem;
            margin: 2.5rem 0 1rem;
            color: #fff;
            border-left: 4px solid #4080ff;
            padding-left: 15px;
        }

        .post-content blockquote {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(64, 128, 255, 0.1);
            border-radius: 15px;
            border-left: 4px solid #4080ff;
            font-style: italic;
        }

        .post-content hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 3rem 0;
        }

        .highlight {
            color: #4080ff;
            font-weight: 700;
        }

        /* [Stars Background] */
        #stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* [Footer] */
        .main-footer {
            width: 100%;
            max-width: 800px;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;

        .footer-grid {
            display: grid;

            margin-bottom: 40px;
        }

        .footer-col h4 {
            font-size: 14px;
            margin-bottom: 20px;
            color: #4080ff;
            text-transform: uppercase;
        }

        .footer-col ul { list-style: none; }

    <script>
        const blogPosts = {
            1: {
                title: "내가 좋아하는 것과 잘하는 것이 다를 때, 어떻게 해야 할까?",
                content: `
                    <p>"좋아하는 것을 직업으로 삼아야 할까, 아니면 잘하는 것을 직업으로 삼아야 할까?"</p>
                    <p>이 질문은 수많은 청소년들이 진로를 고민할 때 부딪히는 가장 대표적인 딜레마 중 하나입니다. 좋아하는 것과 잘하는 것이 일치하면 더할 나위 없이 좋겠지만, 현실에서는 그 둘이 다른 경우가 훨씬 많습니다. 그림 그리는 걸 좋아하지만 실력이 부족하다고 느끼는 사람도 있고, 수학은 잘하는데 조금도 재미를 못 느끼는 사람도 있습니다.</p>

                    <h2>좋아하는 것의 힘</h2>
                    <p>좋아하는 일을 직업으로 삼았을 때의 가장 큰 장점은 <span class="highlight">지속성</span>입니다. 힘들고 어려운 순간이 와도 "내가 선택한 길이니까"라는 마음으로 버텨낼 수 있는 동력이 생깁니다. 심리학자 미하이 칙센트미하이가 제안한 개념인 '몰입(Flow)' 상태는 자신이 좋아하는 일을 할 때 훨씬 자주, 깊게 경험됩니다. 몰입 상태에서는 시간 가는 줄 모르고, 피로감을 덜 느끼며, 창의적인 아이디어가 더 잘 잘 떠오릅니다.</p>
                    <p>하지만 좋아하는 것만으로는 부족할 때도 있습니다. 좋아하는 일을 직업으로 삼으면 그 일이 '생계 수단'이 되는 순간, 즐거움보다 의무감이 앞설 수 있습니다. 좋아하던 것이 싫어지는 경험, 한 번쯤 해보셨나요?</p>

                    <h2>잘하는 것의 강점</h2>
                    <p>반면, 잘하는 것을 직업으로 삼으면 초기에 더 빠른 성과를 낼 수 있습니다. 사람들은 자신이 잘하는 분야에서 인정받을 때 성취감을 느끼고, 그 성취감이 다시 동기부여로 이어지는 선순환이 만들어지기도 합니다. 또한 잘하는 일은 꾸준히 하다 보면 점차 좋아지게 되는 경우도 많습니다.</p>

                    <h2>현실적인 해답: 교집합을 찾아라</h2>
                    <p>전문가들은 이 딜레마의 해답으로 <span class="highlight">'좋아하는 것'과 '잘하는 것'의 교집합</span>을 찾으라고 말합니다. 그런데 중요한 건, 그 교집합은 처음부터 완벽하게 존재하는 게 아니라 시간과 노력을 통해 만들어지기도 한다는 점입니다.</p>
                    <p>좋아하는 일을 더 잘하기 위해 노력하는 것, 혹은 잘하는 일 안에서 즐거움을 발견하는 것, 이 두 가지 접근이 모두 가능합니다. 지금 당장 완벽한 답을 찾으려 하기보다는, 다양한 경험을 통해 조금씩 자신을 이해해 나가는 과정이 더 중요합니다.</p>

                    <h2>POLARIS가 도와드릴 수 있는 것</h2>
                    <p>POLARIS의 성향 테스트는 여러분이 어떤 분야에서 강점을 가지고, 어떤 활동에서 에너지를 얻는지 탐색하는 데 도움을 드립니다. 좋아하는 것과 잘하는 것의 방향을 함께 살펴보면서 나만의 북극성을 찾아보세요.</p>
                    <blockquote>
                        진로는 한 번에 결정하는 것이 아니라, 평생에 걸쳐 탐색하고 다듬어 나가는 여정입니다. 지금 이 순간, 완벽한 답을 찾지 못해도 괜찮습니다. 북극성은 항상 제자리에 있으니까요.
                    </blockquote>
                `
            },
            2: { title: "글 2: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            3: { title: "글 3: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            4: { title: "글 4: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            5: { title: "글 5: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            6: { title: "글 6: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            7: { title: "글 7: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            8: { title: "글 8: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            9: { title: "글 9: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" },
            10: { title: "글 10: 준비 중입니다", content: "<p>곧 새로운 따뜻한 이야기가 올라올 예정입니다.</p>" }
        };

        const btnContainer = document.getElementById('post-buttons');
        const viewTitle = document.getElementById('view-title');
        const viewContent = document.getElementById('view-content');

        // Initial setup
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'post-btn' + (i === 1 ? ' active' : '');
            btn.innerText = '글 ' + i;
            btn.onclick = () => loadPost(i, btn);
            btnContainer.appendChild(btn);
        }

        function loadPost(id, btn) {
            // Remove active class from all
            document.querySelectorAll('.post-btn').forEach(b => b.classList.remove('active'));
            // Add to current
            btn.classList.add('active');

            // Animation out
            gsap.to("#post-view", {
                opacity: 0, 
                y: 10, 
                duration: 0.3,
                onComplete: () => {
                    const post = blogPosts[id] || { title: "Error", content: "Post not found." };
                    viewTitle.innerHTML = post.title;
                    viewContent.innerHTML = post.content;
                    
                    // Animation in
                    gsap.to("#post-view", { opacity: 1, y: 0, duration: 0.5 });
                }
            });
        }

        // Load First Post
        window.addEventListener('load', () => loadPost(1, document.querySelector('.post-btn')));
    </script>

    <script>
        const canvas = document.getElementById('stars-bg');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            const stars = [];
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Star {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 1.5;
                    this.opacity = Math.random();
                    this.blinkSpeed = 0.005 + Math.random() * 0.01;
                }
                draw() {
                    this.opacity += this.blinkSpeed;
                    if (this.opacity > 1 || this.opacity < 0) this.blinkSpeed *= -1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, this.opacity)})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 200; i++) stars.push(new Star());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => s.draw());
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
    <script>
        const nt = document.getElementById('nav-toggle');
        const nm = document.getElementById('nav-menu');
        nt.addEventListener('click', (e) => { e.stopPropagation(); nm.classList.toggle('active'); });
        document.addEventListener('click', (e) => { if (!nm.contains(e.target)) nm.classList.remove('active'); });
