<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>북극성이란? - POLARIS</title>
    <style>
        :root {
            --bg-color: #040a18;
            --accent-blue: #4080ff;
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: system-ui, -apple-system, sans-serif;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .hero-section {
            width: 100%;
            height: 100vh;
            position: relative;
            background: url('./assets/bg-mission-D1bTKlQg.png') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 20px 60px;
        }

        /* 그라디언트 오버레이 */
        .hero-section::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(4, 10, 24, 0.9) 100%);
            z-index: 1;
        }

        /* 뒤로가기 버튼 */
        .back-btn {
            position: absolute;
            top: env(safe-area-inset-top, 40px);
            left: 20px;
            z-index: 10;
            padding: 10px 16px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-content {
            position: relative;
            z-index: 5;
        }

        .section-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 콘텐츠 영역 */
        .content-area {
            background-color: var(--bg-color);
            padding: 40px 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            width: 100%;
            padding: 24px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(64, 128, 255, 0.15);
            border-radius: 20px;
        }

        .card-label {
            font-size: 11px;
            color: var(--accent-blue);
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .card-text {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>
<body>
    <!-- 히어로 섹션 -->
    <header class="hero-section">
        <a href="index.html" class="back-btn">← POLARIS</a>
        <div class="hero-content">
            <h1 class="section-title">북극성이란?</h1>
        </div>
    </header>

    <!-- 콘텐츠 레이아웃 영역 -->
    <main class="content-area">
        <div class="glass-card">
            <div class="card-label">The North Star</div>
            <p class="card-text">
                북극성은 우리의 어두운 하늘에서 변하지 않는 나침반과 같습니다. 수많은 별들이 이동하는 밤에도, 북극성만은 그 자리를 지키며 여행자들에게 정북향을 알려줍니다.
            </p>
        </div>
        <div class="glass-card">
            <div class="card-label">Guidance of Dream</div>
            <p class="card-text">
                POLARIS 프로젝트는 당신의 인생에서 길을 잃지 않게 도와주는 '꿈'이라는 북극성을 찾아가는 여정을 지원합니다. 
            </p>
        </div>
    </main>
</body>
</html>
