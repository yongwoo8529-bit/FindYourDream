<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .top-nav {
            position: fixed; top: 0; width: 100%; max-width: 800px; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 100;
            background: rgba(4, 10, 24, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 20px; color: #fff; text-decoration: none; }
        .blog-container {
            max-width: 800px; width: 90%; margin: 120px auto 100px;
            padding: 3rem; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }
        .post-title {
            font-size: 2rem; margin-bottom: 2rem; line-height: 1.4;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .post-content { line-height: 1.8; font-size: 1.1rem; color: rgba(255, 255, 255, 0.85); }
        .post-content h2 { color: #fff; border-left: 4px solid #4080ff; padding-left: 15px; margin-top: 2rem; }
        .highlight { color: #4080ff; font-weight: 700; }
        .back-btn {
            display: inline-block; margin-top: 2rem; padding: 12px 24px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; text-decoration: none; border-radius: 50px; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }
        #stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
  <script type="module" crossorigin src="./assets/post-BMjCvjSz.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="./assets/style-B9nB6zRB.css">
</head>
<body>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">POLARIS</a>
        <button id="nav-toggle" class="nav-btn">NAVIGATE</button>

            <div class="nav-menu-content">
                <a href="about.html" class="menu-item">브랜드 스토리</a>
                <a href="results-guide.html" class="menu-item">은하계 가이드</a>
                <a href="blog.html" class="menu-item">블로그</a>
            </div>
        </div>
    </nav>

    <canvas id="stars-bg"></canvas>

    <article class="blog-container">
        <h1 id="post-title" class="post-title">불러오는 중...</h1>
        <div id="post-content" class="post-content"></div>
        <a href="blog.html" class="back-btn">← 목록으로 돌아가기</a>
    </article>

</body>
</html>
